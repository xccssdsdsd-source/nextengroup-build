name: Deploy to Cloudflare (production)

# Każdy push na master buduje aplikację (OpenNext) i wdraża Worker
# getbuild-build przez `wrangler deploy` — tak jak lokalne `npm run deploy`.
#
# WYMAGANE SEKRETY REPO (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token z uprawnieniem "Edit Cloudflare Workers"
#   CLOUDFLARE_ACCOUNT_ID  — (opcjonalnie) ID konta Cloudflare
#
# Bez tych sekretów krok deployu zakończy się błędem autoryzacji.

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: cf-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          # Nie pobieraj Chromium dla puppeteer — niepotrzebny przy deployu.
          PUPPETEER_SKIP_DOWNLOAD: 'true'

      - name: Build (OpenNext) and deploy (Wrangler)
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
