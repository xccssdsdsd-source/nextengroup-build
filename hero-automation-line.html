<style>
  :root {
    --bg: #05080d;
    --prompt: #334155;
    --line-1: #94a3b8;
    --line-2: #22d3ee;
    --cursor: #22d3ee;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", Menlo, Consolas, monospace;
    --type-size: clamp(15px, 2.4vw, 22px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box }

  .stage {
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    padding: 24px;
  }

  .term {
    width: 100%;
    max-width: 720px;
    font-family: var(--font-mono);
    font-size: var(--type-size);
    line-height: 1.65;
    letter-spacing: -0.01em;
  }

  .row {
    display: flex;
    align-items: baseline;
    gap: 0.6ch;
    min-height: 1.65em;
  }

  .prompt {
    color: var(--prompt);
    flex-shrink: 0;
    user-select: none;
  }

  .text {
    white-space: pre-wrap;
    word-break: break-word;
    transition: opacity 380ms ease;
  }

  .text[data-line="1"] { color: var(--line-1) }
  .text[data-line="2"] { color: var(--line-2) }

  .cursor {
    display: inline-block;
    width: 0.6ch;
    height: 1.05em;
    transform: translateY(0.14em);
    background: var(--cursor);
    margin-left: 0.1ch;
    animation: blink 1s steps(1) infinite;
  }

  .cursor.hidden { display: none }

  @keyframes blink {
    0%, 50% { opacity: 1 }
    50.01%, 100% { opacity: 0 }
  }

  @media (prefers-reduced-motion: reduce) {
    .text { transition: none }
    .cursor { display: none }
  }
</style>

<div class="stage">
  <div class="term" role="img" aria-label="Wiadomość klienta zamienia się w gotową wycenę">
    <div class="row">
      <span class="prompt">&gt;</span>
      <span class="text" data-line="1" id="text"></span>
      <span class="cursor" id="cursor"></span>
    </div>
  </div>
</div>

<script>
  const LINE_1 = 'Dzień dobry, ile kosztuje strona dla mojej firmy?'
  const LINE_2 = 'Wycena: 4 900 zł · realizacja 14 dni · rozmowa: jutro 10:00'

  const textEl = document.getElementById('text')
  const cursorEl = document.getElementById('cursor')
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches

  if (reduce) {
    textEl.dataset.line = '2'
    textEl.textContent = LINE_2
  } else {
    const TYPE_1 = 46
    const TYPE_2 = 26
    const HOLD_1 = 750
    const FADE = 420
    const HOLD_2 = 1300
    const GAP = 1000

    const type = (text, speed) => new Promise(resolve => {
      textEl.textContent = ''
      textEl.style.opacity = '1'
      const start = performance.now()
      const tick = now => {
        const chars = Math.min(text.length, Math.floor((now - start) / speed))
        textEl.textContent = text.slice(0, chars)
        if (chars >= text.length) return resolve()
        requestAnimationFrame(tick)
      }
      requestAnimationFrame(tick)
    })

    const wait = ms => new Promise(r => setTimeout(r, ms))

    const run = async () => {
      while (true) {
        textEl.dataset.line = '1'
        cursorEl.classList.remove('hidden')
        await type(LINE_1, TYPE_1)
        await wait(HOLD_1)
        cursorEl.classList.add('hidden')
        textEl.style.opacity = '0'
        await wait(FADE)
        textEl.dataset.line = '2'
        cursorEl.classList.remove('hidden')
        await type(LINE_2, TYPE_2)
        await wait(HOLD_2)
        cursorEl.classList.add('hidden')
        textEl.style.opacity = '0'
        await wait(FADE)
        await wait(GAP)
      }
    }
    run()
  }
</script>
