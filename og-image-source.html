<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0d1117;
    font-family: -apple-system, 'Inter', 'Segoe UI', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .bg-glow {
    position: absolute;
    width: 600px;
    height: 400px;
    background: radial-gradient(ellipse, rgba(0,160,255,0.12) 0%, transparent 70%);
    top: -80px;
    right: 100px;
  }

  .bg-glow2 {
    position: absolute;
    width: 400px;
    height: 300px;
    background: radial-gradient(ellipse, rgba(0,210,255,0.08) 0%, transparent 70%);
    bottom: -60px;
    left: 200px;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    height: 100%;
    padding: 0 80px;
    gap: 80px;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, #3b82f6, #06b6d4);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg {
    width: 26px;
    height: 26px;
    fill: white;
  }

  .logo-name {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
  }

  .logo-tld {
    color: #06b6d4;
  }

  .headline {
    font-size: 54px;
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
    letter-spacing: -0.03em;
  }

  .headline .accent {
    color: #06b6d4;
  }

  .sub {
    font-size: 20px;
    color: #8b9ab0;
    line-height: 1.5;
    max-width: 460px;
  }

  .badges {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
  }

  .badge {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 40px;
    padding: 8px 16px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
  }

  .badge-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .badge-lh .badge-dot { background: #22c55e; }
  .badge-speed .badge-dot { background: #f59e0b; }

  .badge-score {
    color: #06b6d4;
    font-weight: 700;
  }

  .right {
    width: 440px;
    flex-shrink: 0;
    position: relative;
  }

  .mockup {
    width: 380px;
    background: #161b26;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    box-shadow:
      0 0 0 1px rgba(0,200,255,0.06),
      0 40px 80px rgba(0,0,0,0.6),
      0 0 60px rgba(0,160,255,0.08);
  }

  .mockup-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }

  .mockup-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .mockup-dot:nth-child(1) { background: #ef4444; }
  .mockup-dot:nth-child(2) { background: #f59e0b; }
  .mockup-dot:nth-child(3) { background: #22c55e; }

  .mockup-url {
    background: rgba(255,255,255,0.06);
    border-radius: 6px;
    height: 10px;
    width: 180px;
    margin-bottom: 20px;
    margin-left: 0;
  }

  .mockup-hero-block {
    background: linear-gradient(135deg, rgba(0,160,255,0.15), rgba(0,210,255,0.08));
    border: 1px solid rgba(0,200,255,0.15);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .mockup-line {
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    margin-bottom: 8px;
  }

  .mockup-line.w-full { width: 100%; }
  .mockup-line.w-3q { width: 75%; }
  .mockup-line.w-half { width: 50%; }
  .mockup-line.accent { background: #06b6d4; width: 80px; height: 28px; border-radius: 6px; }

  .mockup-cards {
    display: flex;
    gap: 10px;
  }

  .mockup-card {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    padding: 10px;
  }

  .mockup-card-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    margin-bottom: 8px;
  }

  .mockup-card:nth-child(1) .mockup-card-dot { background: rgba(147,197,253,0.4); }
  .mockup-card:nth-child(2) .mockup-card-dot { background: rgba(110,231,183,0.4); }
  .mockup-card:nth-child(3) .mockup-card-dot { background: rgba(253,230,138,0.4); }

  .mockup-card-line {
    height: 6px;
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    margin-bottom: 5px;
  }

  .mockup-card-line.short { width: 60%; }

  .badge-lh-overlay {
    position: absolute;
    left: -30px;
    top: 20px;
    background: #1a2332;
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .lh-check {
    width: 32px;
    height: 32px;
    background: rgba(34,197,94,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #22c55e;
    font-size: 16px;
  }

  .lh-text strong {
    display: block;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .lh-text span {
    color: #64748b;
    font-size: 11px;
  }

  .badge-speed-overlay {
    position: absolute;
    left: -20px;
    bottom: 24px;
    background: #1a2332;
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  .speed-icon {
    width: 32px;
    height: 32px;
    background: rgba(245,158,11,0.15);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #f59e0b;
    font-size: 16px;
  }

  .speed-text strong {
    display: block;
    color: #fff;
    font-size: 13px;
    font-weight: 700;
  }

  .speed-text span {
    color: #64748b;
    font-size: 11px;
  }

  .divider {
    width: 1px;
    height: 200px;
    background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08), transparent);
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="container">
  <div class="left">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-name">Getbuild<span class="logo-tld">.pl</span></div>
    </div>

    <div class="headline">
      Strony www,<br>które <span class="accent">napędzają</span><br>Twój biznes
    </div>

    <div class="sub">
      Projektujemy i wdrażamy strony internetowe,<br>automatyzacje AI oraz agentów AI dla firm.
    </div>

    <div class="badges">
      <div class="badge badge-lh">
        <div class="badge-dot"></div>
        Lighthouse <span class="badge-score">96</span>
      </div>
      <div class="badge badge-speed">
        <div class="badge-dot"></div>
        Wdrożenie <span class="badge-score">72h</span>
      </div>
      <div class="badge">
        <div class="badge-dot" style="background:#a78bfa"></div>
        AI-ready
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="mockup">
      <div class="mockup-bar">
        <div class="mockup-dot"></div>
        <div class="mockup-dot"></div>
        <div class="mockup-dot"></div>
      </div>
      <div class="mockup-url"></div>
      <div class="mockup-hero-block">
        <div class="mockup-line w-3q"></div>
        <div class="mockup-line w-full"></div>
        <div class="mockup-line w-half"></div>
        <div style="height:12px"></div>
        <div class="mockup-line accent"></div>
      </div>
      <div class="mockup-cards">
        <div class="mockup-card">
          <div class="mockup-card-dot"></div>
          <div class="mockup-card-line"></div>
          <div class="mockup-card-line short"></div>
        </div>
        <div class="mockup-card">
          <div class="mockup-card-dot"></div>
          <div class="mockup-card-line"></div>
          <div class="mockup-card-line short"></div>
        </div>
        <div class="mockup-card">
          <div class="mockup-card-dot"></div>
          <div class="mockup-card-line"></div>
          <div class="mockup-card-line short"></div>
        </div>
      </div>
    </div>

    <div class="badge-lh-overlay">
      <div class="lh-check">✓</div>
      <div class="lh-text">
        <strong>Lighthouse 96</strong>
        <span>Performance</span>
      </div>
    </div>

    <div class="badge-speed-overlay">
      <div class="speed-icon">⚡</div>
      <div class="speed-text">
        <strong>Wdrożenie 72h</strong>
        <span>od startu do live</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
